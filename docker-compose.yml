services:
  api:
    build:
      context: ./server
      dockerfile: Dockerfile

    container_name: places_app_api

    restart: unless-stopped

    ports:
      - "3000:3000"

    env_file:
      - ./server/.env

    environment:
      # Kai backend sukasi Docker konteineryje,
      # DB_HOST turi būti ne localhost, o postgres service pavadinimas.
      DB_HOST: postgres
      DB_PORT: 5432

      # Frontend vėliau veiks per Vite ant 5173 porto.
      CLIENT_URL: http://localhost:5173

    volumes:
      # Mountinam server folderį, kad pakeitus kodą veiktų nodemon reload.
      - ./server:/app

      # Saugom node_modules konteineryje,
      # kad Windows/host node_modules nesusimaišytų su Docker node_modules.
      - /app/node_modules

    command: npm run dev

    depends_on:
      - postgres

  postgres:
    image: postgres:16

    container_name: places_app_postgres

    restart: unless-stopped

    environment:
      POSTGRES_DB: places_app
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres

    ports:
      # Iš kompiuterio DB bus pasiekiama per localhost:5433.
      # Konteinerio viduje Postgres vis tiek veikia per 5432.
      - "5433:5432"

    volumes:
      # Kad DB duomenys nedingtų perkrovus konteinerį.
      - places_postgres_data:/var/lib/postgresql/data

      # Šitie failai automatiškai paleidžiami tik pirmą kartą,
      # kai volume dar tuščias.
      - ./server/src/db/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql
      - ./server/src/db/seed.sql:/docker-entrypoint-initdb.d/02_seed.sql

  pgadmin:
    image: dpage/pgadmin4

    container_name: places_app_pgadmin

    restart: unless-stopped

    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin

    ports:
      - "5050:80"

    depends_on:
      - postgres

volumes:
  places_postgres_data: